---
# runs on each push to main and is responsible for creating new tags/releases
name: Create Semantic Release

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.semrel.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run go-semantic-release
        id: semrel
        uses: go-semantic-release/action@2e9dc4247a6004f8377781bef4cb9dad273a741f # v1.24.1
        with:
          allow-initial-development-versions: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

  ansible-galaxy:
    needs: semantic-release
    if: needs.semantic-release.outputs.version != ''
    uses: adfinis/github-workflows-bareos/.github/workflows/ansible-galaxy-role-release.yaml@e64e43cab282caa112c5fa5df4d43fd82ed8711f # v0.9.0
    secrets:
      galaxy_api_key: ${{ secrets.GALAXY_API_KEY }}
